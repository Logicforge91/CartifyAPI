spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    clean-disabled: true
    validate-on-migrate: true
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
app:
  security:
    jwt:
      secret: ${JWT_SECRET}
    expose-development-tokens: false
  bootstrap-admin:
    email: ${APP_INITIAL_ADMIN_EMAIL:}
    password: ${APP_INITIAL_ADMIN_PASSWORD:}
