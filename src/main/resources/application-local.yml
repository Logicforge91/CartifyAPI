spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/cartify?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:User@123}
management:
  endpoint:
    health:
      show-details: always
app:
