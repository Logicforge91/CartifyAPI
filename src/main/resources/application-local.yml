    jwt:
      secret: ${JWT_SECRET:bG9jYWwtZGV2ZWxvcG1lbnQtc2VjcmV0LWNoYW5nZS1tZQ==}
    expose-development-tokens: true
  bootstrap-admin:
    email: ${APP_INITIAL_ADMIN_EMAIL:}
    password: ${APP_INITIAL_ADMIN_PASSWORD:}
