spring.application.name=cartify-api
spring.profiles.default=local
spring.profiles.group.dev=local

# Flyway owns the schema in every deployable environment.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# API pagination uses zero-based page indexes and caps requests at 100 items.
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# Only operationally safe actuator endpoints are exposed over HTTP.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.com.cartify.api=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n
